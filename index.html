<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fairy Tale Journal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Niconne&family=Italiana&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <style>
        :root {
            --stone-border: #5d544b;
            --fairy-pink: rgba(255, 105, 180, 0.9);
            --cloud-bg: #fffcf5;
        }

        /* TINKERBELL WAND & SHIMMER */
        * { cursor: none !important; }
        #magic-cursor {
            position: fixed; width: 12px; height: 12px; background: white;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            box-shadow: 0 0 15px 5px gold, 0 0 30px white;
        }
        .sparkle-particle {
            position: fixed; pointer-events: none; width: 6px; height: 6px;
            background: rgba(255, 255, 255, 0.8); border-radius: 50%;
            box-shadow: 0 0 10px 2px gold; z-index: 9999;
        }

        body { margin: 0; overflow: hidden; background: #f2f2f7; font-family: 'Italiana', serif; }

        /* HEADER & CLOUD BUTTONS */
        .library-header h1 {
            font-family: 'Niconne', cursive; font-size: 5rem;
            color: var(--stone-border); margin: 30px; text-align: center;
        }

        .cloud-btn {
            background: var(--cloud-bg);
            border: 3px solid var(--stone-border);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            padding: 12px 35px; font-family: 'Niconne', cursive;
            font-size: 1.5rem; color: var(--stone-border);
            box-shadow: 5px 8px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .cloud-btn:hover { transform: scale(1.05); }

        .shelf-container { display: flex; gap: 40px; padding: 60px; justify-content: center; }

        /* PINK GLOW + ALTERNATING TILT */
        .journal-book {
            width: 170px; height: 240px; border-radius: 5px 20px 20px 5px;
            position: relative; transition: 0.5s; background: white;
            box-shadow: 10px 10px 25px rgba(0,0,0,0.1);
        }
        .journal-book:nth-child(odd) { transform: rotate(-5deg); }
        .journal-book:nth-child(even) { transform: rotate(5deg); }

        .journal-book:hover {
            transform: scale(1.15) rotate(0deg) !important;
            box-shadow: 0 0 60px 20px var(--fairy-pink);
            z-index: 10;
        }

        .book-label {
            position: absolute; bottom: 15px; width: 85%; left: 7.5%;
            background: white; padding: 8px 0; text-align: center;
            font-family: 'Niconne', cursive; font-size: 1.3rem; border-radius: 5px;
        }

        /* 3D FLIPBOOK INTERFACE */
        #bookInterior {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.92); display:none; flex-direction:column;
            align-items: center; justify-content: center; z-index: 1000;
        }

        #bookCanvas { width: 900px; height: 600px; }

        .page { width: 450px; height: 600px; background: white; position: relative; overflow: hidden; }
        
        /* THE WORD-STYLE WRITING LAYER */
        .writing-layer {
            position: absolute; top: 40px; left: 40px; right: 40px; bottom: 40px;
            outline: none; font-family: 'Italiana', serif; font-size: 1.2rem;
            line-height: 1.6; color: #333; overflow-y: auto;
        }

        canvas { position: absolute; top:0; left:0; pointer-events: none; }

        .tool-dock {
            position: absolute; bottom: 20px; display: flex; gap: 10px;
            background: rgba(255,255,255,0.15); padding: 15px; border-radius: 60px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body onload="initApp()">

    <div id="magic-cursor"></div>

    <div class="app-container" id="appBg" style="background-image: url('bg-1.jpg'); background-size: cover; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <button class="cloud-btn" style="position:absolute; top:30px; right:30px;" onclick="changeBackground()">Vibe Switch ✨</button>
        <div class="library-header"><h1>My Journals</h1></div>
        <div class="shelf-container" id="shelf"></div>
    </div>

    <div id="bookInterior">
        <button class="cloud-btn" style="position:absolute; top:30px; left:30px;" onclick="closeBook()">← Gallery</button>
        
        <div id="bookCanvas">
            <div class="page"><div class="writing-layer" contenteditable="true">Write your story here...</div><canvas id="c1"></canvas></div>
            <div class="page"><div class="writing-layer" contenteditable="true"></div><canvas id="c2"></canvas></div>
            <div class="page"><div class="writing-layer" contenteditable="true"></div><canvas id="c3"></canvas></div>
            <div class="page"><div class="writing-layer" contenteditable="true"></div><canvas id="c4"></canvas></div>
        </div>

        <div class="tool-dock">
            <button class="cloud-btn" onclick="setMode('draw')">✏️ Pencil</button>
            <button class="cloud-btn" onclick="setMode('write')">⌨️ Write</button>
            <button class="cloud-btn" onclick="undoLast()">↩️ Undo</button>
            <button class="cloud-btn" onclick="clearAll()">🔥 Burn</button>
        </div>
    </div>

    <script>
        // TINKERBELL SPARKLES
        const cursor = document.getElementById('magic-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle-particle';
            sparkle.style.left = e.clientX + 'px';
            sparkle.style.top = e.clientY + 'px';
            sparkle.style.animation = 'fadeOut 0.8s forwards';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 800);
        });

        let currentMode = 'write';
        let pageFlip = null;

        function initApp() {
            const shelf = document.getElementById('shelf');
            ["Daily Life", "Art Spreads", "Vibe Notes"].forEach((t, i) => {
                shelf.innerHTML += `
                    <div class="journal-book" onclick="openJournal()" style="background-image: url('cover-${i+1}.jpg'); background-size: cover;">
                        <div class="book-label">${t}</div>
                    </div>`;
            });
        }

        let bgNum = 1;
        function changeBackground() {
            bgNum = bgNum >= 3 ? 1 : bgNum + 1;
            document.getElementById('appBg').style.backgroundImage = `url('bg-${bgNum}.jpg')`;
        }

        function openJournal() {
            document.getElementById('bookInterior').style.display = 'flex';
            if(!pageFlip) {
                pageFlip = new St.PageFlip(document.getElementById('bookCanvas'), {
                    width: 450, height: 600, showCover: false
                });
                pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            }
            setMode('write');
        }

        function setMode(mode) {
            currentMode = mode;
            const layers = document.querySelectorAll('.writing-layer');
            const canvases = document.querySelectorAll('canvas');
            
            if(mode === 'write') {
                layers.forEach(l => l.style.pointerEvents = 'auto');
                canvases.forEach(c => c.style.pointerEvents = 'none');
            } else {
                layers.forEach(l => l.style.pointerEvents = 'none');
                canvases.forEach(c => {
                    c.style.pointerEvents = 'auto';
                    c.width = 450; c.height = 600;
                    // Logic for drawing would go here
                });
            }
        }

        function closeBook() { document.getElementById('bookInterior').style.display = 'none'; }
        
        function clearAll() { 
            if(confirm("Burn pages?")) { 
                document.querySelectorAll('.writing-layer').forEach(l => l.innerHTML = ""); 
            }
        }

        initApp();
    </script>
</body>
</html>
