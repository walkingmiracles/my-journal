<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fairy Tale Journal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Niconne&family=Italiana&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <style>
        :root {
            --stone-border: #5d544b;
            --fairy-pink: rgba(255, 105, 180, 0.9);
            --cloud-bg: #fffcf5;
        }

        /* 3. TINKERBELL WAND CURSOR & SHIMMER */
        * { cursor: none !important; }
        #magic-cursor {
            position: fixed; width: 12px; height: 12px; background: white;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            box-shadow: 0 0 15px 5px gold, 0 0 30px white;
        }
        .sparkle-particle {
            position: fixed; pointer-events: none; width: 6px; height: 6px;
            background: rgba(255, 255, 255, 0.8); border-radius: 50%;
            box-shadow: 0 0 10px 2px gold; z-index: 9999;
        }

        body { margin: 0; overflow: hidden; background: #f2f2f7; font-family: 'Italiana', serif; }

        /* 1. CLEANER HEADER */
        .library-header h1 {
            font-family: 'Niconne', cursive; font-size: 5rem;
            color: var(--stone-border); margin: 30px; text-align: center;
            letter-spacing: 2px;
        }

        /* 2. CLOUD BUTTONS */
        .cloud-btn {
            background: var(--cloud-bg);
            border: 3px solid var(--stone-border);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; /* Cloud Shape */
            padding: 15px 40px; font-family: 'Niconne', cursive;
            font-size: 1.6rem; color: var(--stone-border);
            box-shadow: 5px 8px 15px rgba(0,0,0,0.15);
            transition: 0.3s; position: relative;
        }
        .cloud-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,215,0,0.4); }

        .shelf-container {
            display: flex; gap: 40px; padding: 60px; justify-content: center;
        }

        /* 1 & 2. PINK GLOW + ALTERNATING TILT */
        .journal-book {
            width: 170px; height: 240px; border-radius: 5px 20px 20px 5px;
            position: relative; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: white; box-shadow: 10px 10px 25px rgba(0,0,0,0.15);
        }
        /* Alternating Logic */
        .journal-book:nth-child(odd) { transform: rotate(-5deg); }
        .journal-book:nth-child(even) { transform: rotate(5deg); }

        .journal-book:hover {
            transform: scale(1.15) rotate(0deg) !important;
            box-shadow: 0 0 60px 20px var(--fairy-pink);
            z-index: 10;
        }

        /* 3. BOOK LABELS */
        .book-label {
            position: absolute; bottom: 15px; width: 85%; left: 7.5%;
            background: white; padding: 8px 0; text-align: center;
            font-family: 'Niconne', cursive; font-size: 1.3rem; border-radius: 5px;
        }

        /* 4, 5, 6. INTERNAL INTERFACE */
        #bookInterior {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display:none; flex-direction:column;
            align-items: center; justify-content: center; z-index: 1000;
        }

        .tool-dock {
            position: absolute; bottom: 20px; display: flex; gap: 10px;
            background: rgba(255,255,255,0.2); padding: 15px; border-radius: 60px;
            backdrop-filter: blur(10px);
        }

        .page { width: 450px; height: 600px; background: white; position: relative; }
        canvas { position: absolute; top:0; left:0; }
        .text-layer { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; }
        .typed-text { position: absolute; outline: none; border: none; background: none; font-size: 1.2rem; }

        @keyframes fadeOut { from {opacity: 1; transform: scale(1);} to {opacity: 0; transform: scale(0.5);} }
    </style>
</head>
<body onload="initApp()">

    <div id="magic-cursor"></div>

    <div class="app-container" id="appBg" style="background-image: url('bg-1.jpg'); background-size: cover; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <button class="cloud-btn" style="position:absolute; top:30px; right:30px;" onclick="changeBackground()">Vibe Switch ✨</button>
        <div class="library-header"><h1>My Journals</h1></div>
        <div class="shelf-container" id="shelf"></div>
    </div>

    <div id="bookInterior">
        <button class="cloud-btn" style="position:absolute; top:30px; left:30px;" onclick="closeBook()">← Gallery</button>
        
        <div id="bookCanvas">
            <div class="page"><canvas id="c1"></canvas></div>
            <div class="page"><canvas id="c2"></canvas></div>
        </div>

        <div class="tool-dock">
            <button class="cloud-btn" onclick="setMode('draw', 2)">✏️ Pencil</button>
            <button class="cloud-btn" onclick="setMode('draw', 8)">🖌️ Brush</button>
            <button class="cloud-btn" onclick="setMode('text')">⌨️ Write</button>
            <button class="cloud-btn" onclick="undoLast()">↩️ Undo</button>
            <button class="cloud-btn" onclick="clearAll()">🔥 Burn</button>
        </div>
    </div>

    <script>
        // 3. TINKERBELL SPARKLES
        const cursor = document.getElementById('magic-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle-particle';
            sparkle.style.left = e.clientX + 'px';
            sparkle.style.top = e.clientY + 'px';
            sparkle.style.animation = 'fadeOut 0.8s forwards';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 800);
        });

        let currentMode = 'draw';
        let brushSize = 3;
        let history = [];

        function initApp() {
            const shelf = document.getElementById('shelf');
            const titles = ["Daily Life", "Art Spreads", "Vibe Notes"];
            titles.forEach((t, i) => {
                shelf.innerHTML += `
                    <div class="journal-book" onclick="openJournal()" style="background-image: url('cover-${i+1}.jpg'); background-size: cover;">
                        <div class="book-label">${t}</div>
                    </div>
                `;
            });
        }

        // 7. BACKGROUND CHANGE
        let bgNum = 1;
        function changeBackground() {
            bgNum = bgNum >= 3 ? 1 : bgNum + 1;
            document.getElementById('appBg').style.backgroundImage = `url('bg-${bgNum}.jpg')`;
        }

        function openJournal() {
            document.getElementById('bookInterior').style.display = 'flex';
            setupDrawing();
        }

        // 4 & 5. DRAWING & WRITING
        function setupDrawing() {
            const canvas = document.getElementById('c1');
            const ctx = canvas.getContext('2d');
            canvas.width = 450; canvas.height = 600;
            let drawing = false;

            canvas.onmousedown = (e) => {
                if(currentMode === 'text') {
                    const input = document.createElement('input');
                    input.className = 'typed-text';
                    input.style.left = e.offsetX + 'px';
                    input.style.top = e.offsetY + 'px';
                    canvas.parentElement.appendChild(input);
                    input.focus();
                } else {
                    drawing = true;
                    ctx.beginPath();
                    ctx.moveTo(e.offsetX, e.offsetY);
                    history.push(ctx.getImageData(0,0,450,600)); // 6. SAVE PROGRESS
                }
            };
            canvas.onmousemove = (e) => {
                if(!drawing) return;
                ctx.lineWidth = brushSize;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#333';
                ctx.lineTo(e.offsetX, e.offsetY);
                ctx.stroke();
            };
            canvas.onmouseup = () => drawing = false;
        }

        function setMode(mode, size) {
            currentMode = mode;
            if(size) brushSize = size;
        }

        function undoLast() {
            if(history.length > 0) {
                const canvas = document.getElementById('c1');
                canvas.getContext('2d').putImageData(history.pop(), 0, 0);
            }
        }

        function clearAll() {
            if(confirm("Are you sure you want to burn this journal's pages?")) {
                const canvas = document.getElementById('c1');
                canvas.getContext('2d').clearRect(0, 0, 450, 600);
            }
        }

        function closeBook() { document.getElementById('bookInterior').style.display = 'none'; }
    </script>
</body>
</html>
