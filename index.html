<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Journal Library</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Niconne&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
    
    <style>
        @font-face { font-family: 'Motherland'; src: url('motherland.ttf') format('truetype'); font-weight: bold; }
        @font-face { font-family: 'Antiquarian'; src: url('antiquarian.ttf') format('truetype'); font-weight: bold; }

        :root {
            --ios-blur: blur(25px);
            --ios-glass: rgba(255, 255, 255, 0.4);
            --glow-pink: rgba(255, 182, 193, 0.8);
            --ios-text: #1d1d1f;
            --ios-blue: #007aff;
            --ios-red: #ff3b30;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            background-color: #f2f2f7;
        }

        .app-container {
            width: 100%; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background-size: cover; background-position: center;
            transition: background 1s ease-in-out;
        }

        /* Background Switcher Button */
        .bg-switcher {
            position: absolute; top: 25px; right: 25px;
            background: var(--ios-glass); backdrop-filter: var(--ios-blur);
            padding: 12px 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.5);
            font-weight: 600; color: var(--ios-text);
            cursor: pointer; z-index: 50;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .library-header h1 {
            font-family: 'Antiquarian', 'Italiana', serif;
            font-weight: 800; color: var(--ios-text);
            letter-spacing: -0.5px; margin-bottom: 50px;
            font-size: 3rem; text-align: center;
        }

        .shelf-container {
            width: 90%; max-width: 950px;
            background: var(--ios-glass); backdrop-filter: var(--ios-blur);
            padding: 60px 40px; border-radius: 50px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 45px; justify-items: center;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .journal-book {
            width: 170px; aspect-ratio: 3 / 4;
            border-radius: 8px 24px 24px 8px;
            cursor: pointer; position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
        }

        .journal-book:hover, .journal-book.selected {
            transform: scale(1.05) translateY(-8px);
            box-shadow: 0 0 30px 5px var(--glow-pink);
        }

        .book-cover-img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px 24px 24px 8px; }

        .book-info {
            position: absolute; bottom: 15px; width: 88%; left: 6%;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 0; text-align: center;
            font-family: 'Motherland', 'Niconne', cursive;
            font-weight: 700; font-size: 1.2rem; color: #000; 
            border-radius: 12px;
        }

        /* Action Buttons (Rename & Delete) */
        .rename-btn, .delete-btn {
            position: absolute; width: 32px; height: 32px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; border: 2px solid white; opacity: 0; transition: 0.3s; z-index: 10;
        }
        .rename-btn { top: -12px; right: -12px; background: var(--ios-blue); color: white; }
        .delete-btn { top: -12px; left: -12px; background: var(--ios-red); color: white; }
        
        .journal-book:hover .rename-btn, .journal-book:hover .delete-btn { opacity: 1; }

        #bookInterior {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.2); backdrop-filter: blur(30px);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }

        @media (max-width: 600px) {
            .shelf-container { grid-template-columns: repeat(2, 1fr); padding: 30px 15px; }
            .journal-book { width: 145px; }
            .rename-btn, .delete-btn { opacity: 1; } /* Always show on mobile */
        }
    </style>
</head>
<body onload="initApp()">

    <div class="app-container" id="appBg">
        <button class="bg-switcher" onclick="changeBackground()">Change Vibe ✨</button>
        
        <div class="library-header">
            <h1>My Journals</h1>
        </div>
        <div class="shelf-container" id="shelf"></div>
    </div>

    <div id="bookInterior">
        <button class="back-btn" onclick="closeBook()" style="position: absolute; top: 40px; left: 30px; background: var(--ios-blue); color: white; border: none; padding: 12px 24px; border-radius: 20px; font-weight: 600; cursor: pointer;">← Library</button>
        <div id="flipbook"></div>
    </div>

    <script>
        const openSound = new Audio('open-book.mp3');
        let currentBg = 1;

        // Added your 3rd Journal back here
        let myBooks = [
            { id: 1, title: "Daily Life", cover: "cover-1.jpg", pageColor: "#fffaf0" },
            { id: 2, title: "Art Spreads", cover: "cover-2.jpg", pageColor: "#fdf2f2" },
            { id: 3, title: "Vibe Notes", cover: "cover-3.jpg", pageColor: "#f0f9ff" }
        ];

        function initApp() {
            document.getElementById('appBg').style.backgroundImage = "url('bg-1.jpg')";
            renderShelf();
        }

        function renderShelf() {
            const shelf = document.getElementById('shelf');
            shelf.innerHTML = ''; 
            myBooks.forEach(book => {
                shelf.innerHTML += `
                    <div class="journal-book" id="book-${book.id}" onclick="selectJournal(${book.id}, '${book.title}', '${book.pageColor}')">
                        <div class="delete-btn" onclick="deleteJournal(event, ${book.id})">✕</div>
                        <div class="rename-btn" onclick="renameJournal(event, ${book.id})">✎</div>
                        <img src="${book.cover}" class="book-cover-img" onerror="this.src='https://via.placeholder.com/150x200?text=Cover'">
                        <div class="book-info">${book.title}</div>
                    </div>
                `;
            });
            shelf.innerHTML += `
                <div class="journal-book" style="background: rgba(255,255,255,0.5); border:2px dashed #007aff; display:flex; align-items:center; justify-content:center;" onclick="addNewBook()">
                    <span style="font-size:3rem; color:#007aff; font-weight:200;">+</span>
                </div>`;
        }

        function changeBackground() {
            currentBg = currentBg >= 3 ? 1 : currentBg + 1;
            document.getElementById('appBg').style.backgroundImage = `url('bg-${currentBg}.jpg')`;
        }

        function deleteJournal(event, id) {
            event.stopPropagation();
            if(confirm("Delete this journal permanently?")) {
                myBooks = myBooks.filter(b => b.id !== id);
                renderShelf();
            }
        }

        function renameJournal(event, id) {
            event.stopPropagation();
            let newName = prompt("Enter new journal name:");
            if (newName) {
                const book = myBooks.find(b => b.id === id);
                book.title = newName;
                renderShelf();
            }
        }

        function selectJournal(id, title, color) {
            openSound.play().catch(e => console.log("Sound ready"));
            document.getElementById('bookInterior').style.display = 'flex';
        }

        function closeBook() { document.getElementById('bookInterior').style.display = 'none'; }

        function addNewBook() {
            let name = prompt("Name your new journal:");
            if(name) {
                myBooks.push({ id: Date.now(), title: name, cover: "cover-1.jpg", pageColor: "#ffffff" });
                renderShelf();
            }
        }
    </script>
</body>
</html>
