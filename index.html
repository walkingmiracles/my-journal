<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grand Journal Gallery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Niconne&family=Italiana&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <style>
        @font-face { font-family: 'Motherland'; src: url('motherland.ttf') format('truetype'); }

        :root {
            --engraved-bg: #fffcf5;
            --stone-border: #4a4238;
            --gold-glow: 0 0 20px 5px rgba(255, 215, 0, 0.6);
            --fairy-pink: rgba(255, 105, 180, 0.9);
        }

        /* 5. GLOWING FAIRY WAND CURSOR */
        body {
            margin: 0; overflow: hidden; background: #f2f2f7;
            font-family: 'Italiana', serif;
            cursor: url('https://cur.cursors-4u.net/symbols/sym-9/sym833.cur'), auto !important;
        }

        /* 2. ENGRAVED FRAME BUTTONS */
        .engraved-ui {
            background: var(--engraved-bg);
            border: 4px solid var(--stone-border);
            border-image: url('https://www.transparenttextures.com/patterns/dark-wood.png') 30 round;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2), 5px 5px 15px rgba(0,0,0,0.3);
            font-family: 'Niconne', cursive;
            font-weight: bold; font-size: 1.5rem;
            padding: 10px 30px; border-radius: 5px;
            color: var(--stone-border); cursor: pointer;
        }

        .library-header h1 {
            font-family: 'Niconne', cursive; font-size: 4rem;
            color: var(--stone-border); text-shadow: 2px 2px 0px #fff;
            margin: 20px;
        }

        .shelf-container {
            display: flex; gap: 50px; padding: 60px;
            background: rgba(255,255,255,0.2); backdrop-filter: blur(20px);
            border-radius: 80px; border: 2px solid var(--stone-border);
        }

        .journal-book {
            width: 180px; height: 250px; border-radius: 5px 20px 20px 5px;
            position: relative; transition: 0.4s;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.2);
        }

        /* 2. HYPER PINK GLOW */
        .journal-book:hover {
            transform: scale(1.1) rotate(-3deg);
            box-shadow: 0 0 60px 20px var(--fairy-pink), 0 0 100px 40px rgba(255,105,180,0.3);
        }

        /* 7, 8, 9, 10. INTERNAL PAGE TOOLS */
        #bookInterior {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); display:none; flex-direction:column;
            align-items: center; justify-content: center; z-index: 1000;
        }

        .tool-dock {
            position: absolute; bottom: 30px; display: flex; gap: 15px;
            background: var(--engraved-bg); padding: 15px; border-radius: 50px;
            border: 3px solid var(--stone-border);
        }

        .flip-container { width: 900px; height: 600px; }

        .page {
            width: 450px; height: 600px; background: white;
            border: 1px solid #ddd; position: relative;
        }

        canvas { position: absolute; top:0; left:0; pointer-events: auto; }

        .sparkle {
            position: absolute; width: 10px; height: 10px;
            background: white; border-radius: 50%; pointer-events: none;
            box-shadow: 0 0 10px gold; z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="app-container" id="appBg" style="background-image: url('bg-1.jpg'); background-size: cover; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <button class="engraved-ui" style="position:absolute; top:30px; right:30px;" onclick="changeBackground()">Vibe Switch ✨</button>
        <div class="library-header"><h1>My Journals</h1></div>
        <div class="shelf-container" id="shelf"></div>
    </div>

    <div id="bookInterior">
        <button class="engraved-ui" style="position:absolute; top:30px; left:30px;" onclick="closeBook()">← Gallery</button>
        
        <div class="flip-container" id="flipContainer">
            <div id="bookCanvas">
                <div class="page" id="p1"><canvas id="c1"></canvas></div>
                <div class="page" id="p2"><canvas id="c2"></canvas></div>
                <div class="page" id="p3"><canvas id="c3"></canvas></div>
                <div class="page" id="p4"><canvas id="c4"></canvas></div>
            </div>
        </div>

        <div class="tool-dock">
            <button class="engraved-ui" onclick="setMode('draw')">🖋️ Pen</button>
            <button class="engraved-ui" onclick="setMode('text')">⌨️ Write</button>
            <button class="engraved-ui" onclick="document.getElementById('imgInput').click()">🖼️ Pic</button>
            <button class="engraved-ui" onclick="addSticker()">⭐ Sticker</button>
            <select class="engraved-ui" onchange="setPaper(this.value)">
                <option value="blank">Blank</option>
                <option value="lined">Lined</option>
                <option value="grid">Grid</option>
            </select>
            <input type="file" id="imgInput" hidden onchange="handleImage(event)">
        </div>
    </div>

    <script>
        const openSound = new Audio('open-book.mp3');
        const flipSound = new Audio('flip.mp3');
        let currentMode = 'draw';

        // 5. FAIRY SPARKLE TRAIL
        document.addEventListener('mousemove', (e) => {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = e.pageX + 'px';
            sparkle.style.top = e.pageY + 'px';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 800);
        });

        const myBooks = [
            { id: 1, title: "Daily Life", cover: "cover-1.jpg" },
            { id: 2, title: "Art Spreads", cover: "cover-2.jpg" },
            { id: 3, title: "Vibe Notes", cover: "cover-3.jpg" }
        ];

        function renderShelf() {
            const shelf = document.getElementById('shelf');
            myBooks.forEach(book => {
                const b = document.createElement('div');
                b.className = 'journal-book';
                b.style.backgroundImage = `url(${book.cover})`;
                b.style.backgroundSize = 'cover';
                b.onclick = () => openJournal();
                b.innerHTML = `<div style="position:absolute; bottom:10px; width:100%; text-align:center; background:white; font-family:'Niconne';">${book.title}</div>`;
                shelf.appendChild(b);
            });
        }

        function openJournal() {
            openSound.play();
            document.getElementById('bookInterior').style.display = 'flex';
            const pageFlip = new St.PageFlip(document.getElementById('bookCanvas'), {
                width: 450, height: 600, showCover: false
            });
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            
            // 1. FIX OVERLAP: Ensure canvas resizes to page
            document.querySelectorAll('canvas').forEach(canvas => {
                canvas.width = 450; canvas.height = 600;
                setupCanvas(canvas);
            });
        }

        // 7 & 10. DRAWING LOGIC
        function setupCanvas(canvas) {
            const ctx = canvas.getContext('2d');
            let painting = false;
            canvas.onmousedown = () => painting = true;
            canvas.onmouseup = () => { painting = false; ctx.beginPath(); };
            canvas.onmousemove = (e) => {
                if (!painting || currentMode !== 'draw') return;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#333';
                ctx.lineTo(e.offsetX, e.offsetY);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(e.offsetX, e.offsetY);
            };
        }

        function setMode(mode) { currentMode = mode; alert("Mode changed to: " + mode); }

        function closeBook() { location.reload(); } // Simple reset to gallery

        renderShelf();
    </script>
</body>
</html>
